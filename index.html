            const [modDir, setModDir] = useState('yes');
            const [modQty, setModQty] = useState(1);
            const [modPrice, setModPrice] = useState(35.0);

            // Sync Total Cost and Avg Price for Current Position
            const handlePosQtyChange = (e) => {
                const val = parseFloat(e.target.value) || 0;
                setPosQty(val);
                setPosTotal(val * posPrice);
            };

            const handlePosPriceChange = (e) => {
                const val = parseFloat(e.target.value) || 0;
                setPosPrice(val);
                setPosTotal(val * posQty);
            };

            const handlePosTotalChange = (e) => {
                const val = parseFloat(e.target.value) || 0;
                setPosTotal(val);
                if (posQty > 0) setPosPrice(val / posQty);
            };

            // Calculate Results
            let resDir = posDir;
            let resQty = posQty;
            let resTotal = posTotal;
            let resAvg = posPrice;
            let statusStr = "Unchanged";

            if (modQty > 0) {
                if (posDir === modDir) {
                    // Increasing Position
                    resQty = posQty + modQty;
                    resTotal = posTotal + (modQty * modPrice);
                    resAvg = resQty > 0 ? resTotal / resQty : 0;
                    statusStr = "Increased Position";
                } else {
                    // Opposite Direction (Closing or Flipping)
                    if (posQty > modQty) {
                        resQty = posQty - modQty;
                        resAvg = posPrice; // Avg price remains unchanged for remaining shares
                        resTotal = resQty * resAvg;
                        statusStr = "Reduced Position";
                    } else if (posQty < modQty) {
                        resQty = modQty - posQty;
                        resDir = modDir;
                        resAvg = modPrice;
                        resTotal = resQty * resAvg;
                        statusStr = `Flipped Position to ${modDir.toUpperCase()}`;
                    } else {
                        resQty = 0;
                        resTotal = 0;
                        resAvg = 0;
                        statusStr = "Closed Position";
                    }
                }
            }

                            className={`px-4 py-2 whitespace-nowrap rounded-t-lg font-semibold transition-colors ${view === 'calculator' ? 'bg-emerald-600 text-white' : 'text-slate-400 hover:text-white'}`}
                        >
                            Position Calculator
                        </button>
                    </div>

                    {/* Chart Area */}
                    <div className="glass-panel p-6 min-h-[500px]">
                        
                        {view === 'calculator' && <PositionCalculator />}

                        {view === 'mayTrend' && (
                            <div className="h-full flex flex-col">
                                <div className="mb-4">
                                    <h2 className="text-xl font-bold text-white">May Rainfall & 5-Year Averages (1976 - 2025)</h2>
                                    <p className="text-sm text-slate-400">Visualizing the "Alternating May" volatility and regression to the 4.2" mean.</p>
                                </div>
                                <div className="flex-grow h-[400px]">
                                    <ResponsiveContainer width="100%" height="100%">
                                        <ComposedChart data={rainfallData.slice(0, 50)} margin={{ top: 20, right: 30, left: 0, bottom: 0 }}>
                                            <CartesianGrid strokeDasharray="3 3" stroke="#334155" />
                                            <XAxis dataKey="year" stroke="#94a3b8" />
                                            <YAxis stroke="#94a3b8" label={{ value: 'Inches', angle: -90, position: 'insideLeft', fill: '#94a3b8' }} />
                                            <Tooltip content={<CustomTooltip />} />
                                            <Legend />
                                            <ReferenceLine y={4.0} stroke="#ef4444" strokeDasharray="3 3" label={{ position: 'top', value: '4.0" Threshold', fill: '#ef4444', fontSize: 12 }} />
                                            <Bar dataKey="may" name="May Rainfall" fill="#3b82f6" opacity={0.8} />
                                            <Line type="monotone" dataKey="mayAvg" name="5-Year Rolling Avg" stroke="#10b981" strokeWidth={3} dot={false} />
                                        </ComposedChart>
                                    </ResponsiveContainer>
                                </div>
                            </div>
                        )}

                        {}
                        {view === 'springDeficit' && (
                            <div className="h-full flex flex-col">
                                <div className="mb-4">
                                    <h2 className="text-xl font-bold text-white">Spring Accumulation (Jan - Apr) vs May Outcome</h2>
                                    <p className="text-sm text-slate-400">Notice that 2026 (far right) is entering May with a severe deficit. Historically, heavy May rains follow these dry starts.</p>
                                </div>
                                <div className="flex-grow h-[400px]">
                                    <ResponsiveContainer width="100%" height="100%">
                                        <ComposedChart data={rainfallData} margin={{ top: 20, right: 30, left: 0, bottom: 0 }}>
                                            <CartesianGrid strokeDasharray="3 3" stroke="#334155" />
                                            <XAxis dataKey="year" stroke="#94a3b8" />
                                            <YAxis yAxisId="left" stroke="#94a3b8" label={{ value: 'Jan-Apr Cum. (in)', angle: -90, position: 'insideLeft', fill: '#94a3b8' }} />
                                            <YAxis yAxisId="right" orientation="right" stroke="#94a3b8" label={{ value: 'May Rainfall (in)', angle: 90, position: 'insideRight', fill: '#94a3b8' }} />
                                            <Tooltip content={<CustomTooltip />} />
                                            <Legend />
                                            <ReferenceLine yAxisId="left" y={avgSpringCum} stroke="#f59e0b" strokeDasharray="3 3" label={{ position: 'insideTopLeft', value: 'Avg Spring Start (15.3")', fill: '#f59e0b', fontSize: 12 }} />
                                            <Area yAxisId="left" type="monotone" dataKey="springCum" name="Jan-Apr Accumulation" fill="#475569" stroke="#94a3b8" fillOpacity={0.3} />
                                            <Bar yAxisId="right" dataKey="may" name="May Rainfall" fill="#3b82f6" maxBarSize={20} />
                                        </ComposedChart>
                                    </ResponsiveContainer>
                                </div>
                            </div>
                        )}

                        {}
                        {view === 'similarYears' && (
                            <div className="h-full flex flex-col">
                                <div className="mb-4">
                                    <h2 className="text-xl font-bold text-white">The "Consistent Dry Trend" Pattern</h2>
                                    <p className="text-sm text-slate-400">
                                        Years matching 2026's exact profile: Jan &lt; 3.5", Feb &lt; 3.5", Mar &lt; 4.5", Apr &lt; 3.5". 
                                        Historically results in May &gt; 4.0" 66.7% of the time.
                                    </p>
                                </div>
                                <div className="overflow-x-auto mt-4">
                                    <table className="w-full text-left text-sm text-slate-300">
                                        <thead className="bg-slate-700/50 text-slate-200">
                                            <tr>
                                                <th className="p-4 rounded-tl-lg">Year Pattern</th>
                                                <th className="p-4">January</th>
                                                <th className="p-4">February</th>
                                                <th className="p-4">March</th>
                                                <th className="p-4">April</th>
                                                <th className="p-4 font-bold text-white bg-blue-900/30 rounded-tr-lg">May Outcome</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-700">
                                            <tr className="hover:bg-slate-800/50 transition-colors">
                                                <td className="p-4 font-semibold text-white">1985</td>
                                                <td className="p-4">1.00"</td>
                                                <td className="p-4">2.41"</td>
                                                <td className="p-4">1.91"</td>
                                                <td className="p-4">1.41"</td>
                                                <td className="p-4 font-bold text-blue-400 bg-blue-900/10">5.72" (&gt; 4")</td>
                                            </tr>
                                            <tr className="hover:bg-slate-800/50 transition-colors">
                                                <td className="p-4 font-semibold text-white">1992</td>
                                                <td className="p-4">1.68"</td>
                                                <td className="p-4">1.87"</td>
                                                <td className="p-4">4.08"</td>
                                                <td className="p-4">1.76"</td>
                                                <td className="p-4 font-bold text-blue-400 bg-blue-900/10">4.02" (&gt; 4")</td>
                                            </tr>
                                            <tr className="hover:bg-slate-800/50 transition-colors">
                                                <td className="p-4 font-semibold text-white">2002</td>
                                                <td className="p-4">1.93"</td>
                                                <td className="p-4">0.71"</td>
                                                <td className="p-4">3.53"</td>
                                                <td className="p-4">3.41"</td>
                                                <td className="p-4 font-bold text-red-400 bg-blue-900/10">3.69" (&lt; 4")</td>
                                            </tr>
                                            <tr className="border-t-2 border-slate-600 bg-slate-800">
                                                <td className="p-4 font-bold text-amber-400">2026 (Current)</td>
                                                <td className="p-4 text-amber-400">2.70"</td>
                                                <td className="p-4 text-amber-400">2.60"</td>
                                                <td className="p-4 text-amber-400">3.60"</td>
                                                <td className="p-4 text-amber-400">2.48"</td>
                                                <td className="p-4 font-bold text-slate-500 bg-blue-900/20 italic">Pending...</td>
                                            </tr>
                                        </tbody>
                                    </table>
                                </div>
                                
                                <div className="mt-8 p-4 border border-blue-900 bg-blue-900/20 rounded-lg">
                                    <h4 className="text-blue-400 font-bold mb-2">💡 The 2021 "Exact Match" Anomaly</h4>
                                    <p className="text-slate-300 text-sm">
                                        While the table above looks at broad thresholds, if we look for the year with the 
                                        closest exact match to the March (3.60") and April (2.48") transition, it is <strong>2021</strong> 
                                        (Mar: 3.41", Apr: 2.69"). In 2021, May recorded <strong>4.36 inches</strong> of rain.
                                    </p>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<Dashboard />);
    </script>
</body>
</html>
