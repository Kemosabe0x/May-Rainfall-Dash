<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NYC Rainfall: The 2026 Master Outlook</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap');
        :root {
            --bg-deep: #0f172a;
            --accent-blue: #3b82f6;
            --accent-teal: #14b8a6;
            --accent-rose: #f43f5e;
        }
        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-deep);
            color: #f1f5f9;
            overflow-x: hidden;
        }
        .chart-container {
            position: relative;
            width: 100%;
            max-width: 900px;
            margin: 0 auto;
            height: 400px;
        }
        .glass-card {
            background: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .nav-tab {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .nav-tab.active {
            background: var(--accent-blue);
            color: white;
            box-shadow: 0 4px 14px 0 rgba(59, 130, 246, 0.39);
        }
    </style>
</head>
<body>

<div id="root"></div>

<!-- 
INTEGRATION PLAN:
1. THE NARRATIVE (Tab 1): Porting the visual hero elements and pattern cards from the first version.
2. THE ANALYTICS (Tab 2): Porting the 50-year dataset and table-based comparisons from the second version, converting Recharts to Chart.js.
3. THE TOOLSET (Tab 3): Integrating the advanced Position Modeler for market participants.

VISUAL SELECTION:
- All charts use Chart.js (Canvas) to ensure no SVG usage.
- Label wrapping applied to all categorical charts (>16 chars logic).
- Tooltip title callback configured for multi-line support.
- Color Palette: Brilliant Blues & Energetic Teals (Vibrant High-Contrast).

CONFIRMATION: NEITHER Mermaid JS NOR SVG were used in this output.
-->

<script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // --- UTILITIES ---
    const wrapLabel = (label) => {
        if (typeof label !== 'string' || label.length <= 16) return label;
        const words = label.split(' ');
        const lines = [];
        let currentLine = '';
        words.forEach(word => {
            if ((currentLine + word).length > 16) {
                lines.push(currentLine.trim());
                currentLine = word + ' ';
            } else {
                currentLine += word + ' ';
            }
        });
        lines.push(currentLine.trim());
        return lines;
    };

    const tooltipConfig = {
        callbacks: {
            title: function(tooltipItems) {
                const item = tooltipItems[0];
                let label = item.chart.data.labels[item.dataIndex];
                return Array.isArray(label) ? label.join(' ') : label;
            }
        }
    };

    // --- COMPONENTS ---

    const InfographicTab = () => {
        const chartRef = useRef(null);

        useEffect(() => {
            const ctx = document.getElementById('patternChart').getContext('2d');
            const chart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: [
                        "Post-Deluge Cycle", "Dry March Indicator", "Consistent Dry Trend", 
                        "Alternating Baseline", "Wet January Signal", "Spring Deficit Gauge"
                    ].map(wrapLabel),
                    datasets: [{
                        label: 'Accuracy %',
                        data: [71.4, 66.7, 66.7, 62.5, 61.9, 57.1],
                        backgroundColor: '#14b8a6',
                        borderRadius: 6
                    }]
                },
                options: {
                    indexAxis: 'y',
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false }, tooltip: tooltipConfig },
                    scales: {
                        x: { grid: { color: '#334155' }, ticks: { color: '#94a3b8' }, max: 100 },
                        y: { ticks: { color: '#f1f5f9', font: { weight: '600' } } }
                    }
                }
            });
            return () => chart.destroy();
        }, []);

        return (
            <div className="space-y-12 animate-fade-in">
                <section className="text-center py-10">
                    <h1 className="text-5xl font-800 bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-teal-400 mb-4">THE PRECIPI-CORRECTION</h1>
                    <p className="text-slate-400 max-w-2xl mx-auto">Central Park is currently locked in a -3.92" deficit. Historical data suggests a violent "snap-back" for May 2026.</p>
                </section>

                <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div className="glass-card p-6 rounded-2xl border-t-4 border-rose-500">
                        <div className="text-xs font-bold text-slate-500 uppercase">2026 Deficit</div>
                        <div className="text-4xl font-800 text-rose-400">-3.92"</div>
                    </div>
                    <div className="glass-card p-6 rounded-2xl border-t-4 border-teal-500">
                        <div className="text-xs font-bold text-slate-500 uppercase">Primary Signal</div>
                        <div className="text-4xl font-800 text-teal-400">71.4%</div>
                    </div>
                    <div className="glass-card p-6 rounded-2xl border-t-4 border-blue-500">
                        <div className="text-xs font-bold text-slate-500 uppercase">Market Odds</div>
                        <div className="text-4xl font-800 text-blue-400">35.0¢</div>
                    </div>
                </div>

                <div className="glass-card p-8 rounded-3xl">
                    <h3 className="text-xl font-bold mb-6">Pattern Reliability Matrix</h3>
                    <div className="chart-container">
                        <canvas id="patternChart"></canvas>
                    </div>
                </div>
            </div>
        );
    };

    const AnalyticsTab = () => {
        useEffect(() => {
            const ctx = document.getElementById('historyChart').getContext('2d');
            const chart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: ['2016', '2017', '2018', '2019', '2020', '2021', '2022', '2023', '2024', '2025'],
                    datasets: [
                        {
                            label: 'May Rainfall',
                            data: [3.75, 6.38, 3.53, 6.82, 1.65, 4.36, 4.52, 1.28, 4.11, 6.58],
                            borderColor: '#3b82f6',
                            backgroundColor: 'rgba(59, 130, 246, 0.1)',
                            fill: true,
                            tension: 0.3
                        },
                        {
                            label: 'Historical Mean (4.2")',
                            data: Array(10).fill(4.2),
                            borderColor: '#f43f5e',
                            borderDash: [5, 5],
                            pointStyle: false
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { tooltip: tooltipConfig, legend: { labels: { color: '#94a3b8' } } },
                    scales: {
                        y: { grid: { color: '#334155' }, ticks: { color: '#94a3b8' } },
                        x: { grid: { color: '#334155' }, ticks: { color: '#94a3b8' } }
                    }
                }
            });
            return () => chart.destroy();
        }, []);

        return (
            <div className="space-y-12 animate-fade-in">
                <div className="glass-card p-8 rounded-3xl">
                    <h3 className="text-xl font-bold mb-6">10-Year Volatility & Regression</h3>
                    <div className="chart-container">
                        <canvas id="historyChart"></canvas>
                    </div>
                </div>

                <div className="overflow-x-auto glass-card rounded-2xl">
                    <table className="w-full text-left text-sm">
                        <thead className="bg-slate-800 text-slate-400">
                            <tr>
                                <th className="p-4">Year Pattern</th>
                                <th className="p-4">Jan-Apr Cum.</th>
                                <th className="p-4">May Outcome</th>
                                <th className="p-4">Status</th>
                            </tr>
                        </thead>
                        <tbody className="divide-y divide-slate-700">
                            <tr>
                                <td className="p-4 font-bold">1985 (Twin)</td>
                                <td className="p-4">6.73"</td>
                                <td className="p-4 text-teal-400 font-bold">5.72"</td>
                                <td className="p-4"><span className="px-2 py-1 bg-teal-500/20 text-teal-400 rounded text-xs">MATCH</span></td>
                            </tr>
                            <tr>
                                <td className="p-4 font-bold">2021 (Twin)</td>
                                <td className="p-4">13.54"</td>
                                <td className="p-4 text-teal-400 font-bold">4.36"</td>
                                <td className="p-4"><span className="px-2 py-1 bg-teal-500/20 text-teal-400 rounded text-xs">MATCH</span></td>
                            </tr>
                            <tr className="bg-blue-500/10">
                                <td className="p-4 font-bold text-blue-400">2026 (Current)</td>
                                <td className="p-4 text-blue-400">11.38"</td>
                                <td className="p-4 italic text-slate-500">Predictive: > 4"</td>
                                <td className="p-4"><span className="px-2 py-1 bg-blue-500/40 text-white rounded text-xs">ACTIVE</span></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        );
    };

    const CalculatorTab = () => {
        const [posQty, setPosQty] = useState(10);
        const [posPrice, setPosPrice] = useState(45);
        const [modQty, setModQty] = useState(5);
        const [modPrice, setModPrice] = useState(32);

        const totalCost = (posQty * posPrice) + (modQty * modPrice);
        const avgPrice = totalCost / (posQty + modQty);

        return (
            <div className="max-w-2xl mx-auto glass-card p-8 rounded-3xl border-t-8 border-blue-500 animate-fade-in">
                <h3 className="text-2xl font-800 mb-2">Position Modeler</h3>
                <p className="text-slate-400 mb-8 text-sm">Calculate weighted averages for May Prediction Markets.</p>
                
                <div className="grid grid-cols-2 gap-8 mb-8">
                    <div className="space-y-4">
                        <label className="block text-xs font-bold text-slate-500 uppercase">Existing Shares</label>
                        <input type="number" value={posQty} onChange={e => setPosQty(Number(e.target.value))} className="w-full bg-slate-800 border border-slate-700 rounded-lg p-3" />
                        <label className="block text-xs font-bold text-slate-500 uppercase">Avg Price (¢)</label>
                        <input type="number" value={posPrice} onChange={e => setPosPrice(Number(e.target.value))} className="w-full bg-slate-800 border border-slate-700 rounded-lg p-3" />
                    </div>
                    <div className="space-y-4">
                        <label className="block text-xs font-bold text-teal-500 uppercase">New Purchase</label>
                        <input type="number" value={modQty} onChange={e => setModQty(Number(e.target.value))} className="w-full bg-slate-800 border border-slate-700 rounded-lg p-3" />
                        <label className="block text-xs font-bold text-teal-500 uppercase">Price (¢)</label>
                        <input type="number" value={modPrice} onChange={e => setModPrice(Number(e.target.value))} className="w-full bg-slate-800 border border-slate-700 rounded-lg p-3" />
                    </div>
                </div>

                <div className="pt-8 border-t border-slate-700 flex justify-between items-end">
                    <div>
                        <div className="text-xs font-bold text-slate-500 uppercase">New Weighted Average</div>
                        <div className="text-5xl font-800 text-white">{avgPrice.toFixed(1)}¢</div>
                    </div>
                    <div className="text-right">
                        <div className="text-xs font-bold text-slate-500 uppercase">Total Capital</div>
                        <div className="text-2xl font-800 text-teal-400">${(totalCost / 100).toFixed(2)}</div>
                    </div>
                </div>
            </div>
        );
    };

    const App = () => {
        const [activeTab, setActiveTab] = useState('infographic');

        return (
            <div className="max-w-6xl mx-auto px-4 py-8">
                <nav className="flex justify-center mb-12">
                    <div className="bg-slate-800 p-1 rounded-xl flex space-x-1">
                        <button 
                            onClick={() => setActiveTab('infographic')}
                            className={`nav-tab px-6 py-2 rounded-lg font-bold text-sm ${activeTab === 'infographic' ? 'active' : 'text-slate-400'}`}>
                            NARRATIVE
                        </button>
                        <button 
                            onClick={() => setActiveTab('analytics')}
                            className={`nav-tab px-6 py-2 rounded-lg font-bold text-sm ${activeTab === 'analytics' ? 'active' : 'text-slate-400'}`}>
                            ANALYTICS
                        </button>
                        <button 
                            onClick={() => setActiveTab('calculator')}
                            className={`nav-tab px-6 py-2 rounded-lg font-bold text-sm ${activeTab === 'calculator' ? 'active' : 'text-slate-400'}`}>
                            MODELER
                        </button>
                    </div>
                </nav>

                <main>
                    {activeTab === 'infographic' && <InfographicTab />}
                    {activeTab === 'analytics' && <AnalyticsTab />}
                    {activeTab === 'calculator' && <CalculatorTab />}
                </main>

                <footer className="mt-20 pt-10 border-t border-slate-800 text-center text-slate-500 text-xs">
                    Data sourced from NWS Central Park (1976-2026). Integrated Multi-Pattern Analysis.
                </footer>
            </div>
        );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
</script>

</body>
</html>
